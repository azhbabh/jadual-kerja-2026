<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roster Premium - Ahmad Zilalul Hilmi Bin Adnan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #50c878;
            --primary-dim: rgba(80,200,120,0.12);
            --primary-glow: rgba(80,200,120,0.35);
            --bg: #080c0a;
            --surface: #0f1510;
            --card: #131a14;
            --card-raised: #192118;
            --border: #1e2b1f;
            --border-bright: #2a3d2b;
            --text: #e8f0e9;
            --text-dim: #6b7e6c;
            --text-muted: #3a4a3b;
            --danger: #ff5252;
            --success: #2ecc71;
            --warning: #f39c12;
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 120px 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* ── NOISE TEXTURE OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ── AMBIENT GLOW ── */
        .ambient-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: -200px;
            right: -150px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: driftGlow 8s ease-in-out infinite alternate;
        }

        @keyframes driftGlow {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-30px, 40px) scale(1.1); }
        }

        /* ── PAGE WRAPPER ── */
        .page {
            position: relative;
            z-index: 1;
            padding: 0 14px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ── THEME BAR ── */
        .theme-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 16px 4px 10px;
        }
        .theme-toggle-btn {
            display: flex; align-items: center; gap: 7px;
            background: var(--card); border: 1px solid var(--border-bright);
            border-radius: 20px; padding: 5px 12px 5px 8px;
            cursor: pointer; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem; font-weight: 700;
            color: var(--text-dim); letter-spacing: 0.08em;
        }
        .theme-toggle-btn:active { transform: scale(0.95); }

        /* ── PROFILE HEADER ── */
        .profile-header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary-dim) 0%, transparent 60%);
            pointer-events: none;
        }

        .profile-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.6;
        }

        .profile-left { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; flex: 1; min-width: 0; }

        .avatar-ring {
            position: relative;
            flex-shrink: 0;
        }
        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(var(--primary), transparent 60%, var(--primary));
            animation: spinRing 6s linear infinite;
        }
        @keyframes spinRing { to { transform: rotate(360deg); } }

        .profile-img {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid var(--bg);
            object-fit: cover;
            position: relative;
            z-index: 1;
            cursor: pointer;
            display: block;
        }

        .profile-info { min-width: 0; }
        .profile-name {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .staff-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        #live-clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 700;
        }

        .roster-badge {
            position: relative;
            z-index: 1;
            text-align: right;
            flex-shrink: 0;
            padding-left: 16px;
            border-left: 1px solid var(--border-bright);
        }
        .roster-badge .main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 0.08em;
            color: var(--primary);
            display: block;
            line-height: 1;
            filter: drop-shadow(0 0 12px var(--primary-glow));
            animation: pulseText 4s ease-in-out infinite;
        }
        @keyframes pulseText {
            0%,100% { filter: drop-shadow(0 0 8px var(--primary-glow)); }
            50% { filter: drop-shadow(0 0 20px var(--primary-glow)); }
        }
        .roster-badge .dept {
            font-size: 0.45rem;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: block;
            margin-top: 2px;
        }

        /* ── SHIFT SUMMARY ── */
        .shift-summary {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

        .shift-summary::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: var(--border);
        }

        .summary-pill {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-pill:first-child { border-right: 1px solid var(--border); }

        .summary-pill-label {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
        }
        .summary-pill-val {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
            line-height: 1.2;
        }
        .summary-pill-val.today-val {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text);
        }

        #summary-reminders {
            grid-column: 1 / -1;
            border-top: 1px solid var(--border);
            padding: 10px 14px 4px;
            display: none;
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 6px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--primary-dim);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .stat-card:hover::before, .stat-card:active::before { opacity: 1; }
        .stat-card:active { transform: scale(0.95); }

        .stat-card .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.02em;
            color: var(--text);
            line-height: 1;
            margin: 2px 0 6px;
        }
        .stat-card .stat-val.danger { color: var(--danger); }
        .stat-card small {
            font-size: 0.52rem;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: block;
        }

        .progress-track {
            width: 75%;
            height: 2px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin: 4px auto 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }

        /* ── SUB STATS ROW ── */
        .stats-row-sub {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .action-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-card:active { transform: scale(0.96); background: var(--card-raised); }
        .action-card .action-icon { font-size: 1.2rem; flex-shrink: 0; }
        .action-card .action-label { font-size: 0.55rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
        .action-card .action-title { font-size: 0.72rem; font-weight: 700; }
        .action-card .action-title.save { color: var(--success); }
        .action-card .action-title.restore { color: var(--warning); }

        /* ── SECTION ── */
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--primary);
        }

        /* ── CALENDAR ── */
        .cal-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .cal-nav h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.1em; color: var(--text); }

        .nav-btn {
            background: var(--card-raised);
            border: 1px solid var(--border-bright);
            color: var(--primary);
            width: 34px; height: 34px;
            border-radius: var(--radius-xs);
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:active { background: var(--primary); color: black; transform: scale(0.9); }

        .import-btn {
            width: 100%;
            background: var(--primary-dim);
            border: 1px solid rgba(80,200,120,0.25);
            color: var(--primary);
            border-radius: var(--radius-xs);
            padding: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .import-btn:active { background: var(--primary); color: black; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-label {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .day-box {
            aspect-ratio: 1;
            background: var(--surface);
            border-radius: var(--radius-xs);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            position: relative;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
        }

        .day-box:active { transform: scale(0.88); background: var(--primary-dim); border-color: var(--primary); }

        .day-box.today {
            border-color: var(--primary);
            background: var(--primary-dim);
            box-shadow: 0 0 0 1px var(--primary-glow) inset;
        }

        .day-box .date-num {
            position: absolute;
            top: 2px; left: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: var(--text-dim);
            font-weight: 700;
        }
        .day-box.today .date-num { color: var(--primary); }
        .day-box .shift-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.05rem;
            letter-spacing: 0.03em;
            line-height: 1;
        }
        .day-box .assign-text {
            font-size: 0.38rem;
            color: var(--primary);
            font-weight: 700;
            text-align: center;
            width: 95%;
            overflow: hidden;
            white-space: nowrap;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        /* ── CLAIM SECTION ── */
        .claim-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        /* ── DRUG SECTION ── */
        .drug-toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-rsi {
            background: var(--primary-dim);
            border: 1px solid rgba(80,200,120,0.35);
            color: var(--primary);
            border-radius: var(--radius-xs);
            padding: 5px 10px;
            font-size: 0.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.15s;
        }
        .btn-rsi:active { background: var(--primary); color: black; }

        #btn-pdf {
            background: #1a2e45;
            border: 1px solid rgba(65,105,225,0.4);
            color: #7ab3ff;
            border-radius: var(--radius-xs);
            padding: 5px 9px;
            font-size: 0.6rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-add-drug {
            background: none;
            border: 1px solid var(--border-bright);
            color: var(--primary);
            border-radius: var(--radius-xs);
            width: 28px; height: 28px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .btn-add-drug:active { background: var(--primary); color: black; }

        /* ── INPUTS ── */
        input[type="text"], input[type="number"], input[type="date"], input[type="month"], input[type="time"], select {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            color: var(--text);
            padding: 11px 14px;
            border-radius: var(--radius-xs);
            width: 100%;
            font-size: 0.82rem;
            margin-bottom: 8px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-dim); }

        textarea {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            color: var(--text);
            padding: 12px 14px;
            border-radius: var(--radius-xs);
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            height: 120px;
            resize: none;
            line-height: 1.5;
            transition: border-color 0.15s;
        }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-dim); }

        label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            color: var(--primary);
            display: block;
            margin-bottom: 4px;
            margin-top: 6px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ── DRUG SEARCH INPUT ── */
        #drug-search {
            padding: 10px 14px;
            font-size: 0.8rem;
            background: var(--surface);
        }

        /* ── DRUG ITEM ── */
        .drug-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            transition: border-color 0.2s;
        }
        .drug-item:hover { border-color: var(--border-bright); }
        .drug-name { font-weight: 700; font-size: 0.82rem; color: var(--text); margin-bottom: 3px; }
        .drug-ampule { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--text-dim); margin-bottom: 4px; }
        .drug-prep { font-size: 0.72rem; color: var(--primary); font-weight: 600; line-height: 1.4; }

        /* ── TODO ── */
        .todo-item {
            display: flex;
            align-items: center;
            padding: 9px 4px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }
        .todo-item:last-child { border-bottom: none; }
        .todo-text { flex: 1; font-size: 0.8rem; color: var(--text); }
        .todo-text.done { text-decoration: line-through; color: var(--text-muted); }
        .todo-del { color: var(--danger); background: none; border: none; font-size: 1rem; cursor: pointer; padding: 0 4px; opacity: 0.5; transition: opacity 0.15s; }
        .todo-del:hover { opacity: 1; }

        /* ── RECORD CARD ── */
        .record-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
        }
        .btn-delete { background: none; color: var(--danger); border: none; font-size: 1.3rem; cursor: pointer; opacity: 0.6; }
        .btn-delete:hover { opacity: 1; }

        /* ── PAID ALERT ── */
        .paid-alert {
            background: rgba(46,204,113,0.1);
            color: var(--success);
            border: 1px solid rgba(46,204,113,0.25);
            padding: 8px 12px;
            border-radius: var(--radius-xs);
            font-size: 0.7rem;
            margin-bottom: 8px;
            display: none;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        /* ── BOTTOM SHEET ── */
        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: var(--card);
            border-radius: 28px 28px 0 0;
            padding: 0;
            box-sizing: border-box;
            transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            max-height: 88vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border-bright);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
        }

        .bottom-sheet.active { bottom: 0; }

        .sheet-handle {
            text-align: center;
            padding: 14px 0 4px;
            flex-shrink: 0;
        }
        .sheet-handle::before {
            content: '';
            display: inline-block;
            width: 36px; height: 3px;
            background: var(--border-bright);
            border-radius: 10px;
        }

        .sheet-title-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 24px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sheet-title-bar .sheet-accent {
            width: 3px;
            height: 18px;
            background: var(--primary);
            border-radius: 10px;
            flex-shrink: 0;
        }

        #sheet-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            color: var(--text);
        }

        #sheet-content-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px 40px;
            -webkit-overflow-scrolling: touch;
        }

        /* ── PRIMARY BUTTON ── */
        .btn-primary {
            width: 100%;
            background: var(--primary);
            border: none;
            color: #000;
            padding: 15px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s;
            margin-top: 10px;
        }
        .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

        .btn-secondary {
            width: 100%;
            background: none;
            border: 1px solid var(--border-bright);
            color: var(--text-dim);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.78rem;
            cursor: pointer;

        const old=store.calendar, nw={};
        Object.keys(old).forEach(k=>{
            const p=k.split('-');
            nw[p.length===3?`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`:k]=old[k];
        });
        store.calendar=nw;
    }

    function generateCalendar() {
        const body=document.getElementById('calendar-body');
        const title=document.getElementById('cal-title');
        const months=["Januari","Februari","Mac","April","Mei","Jun","Julai","Ogos","September","Oktober","November","Disember"];
        const year=currentCalDate.getFullYear(), month=currentCalDate.getMonth();
        title.innerText=`${months[month]} ${year}`; body.innerHTML='';
        const firstDay=new Date(year,month,1).getDay();
        const daysInMonth=new Date(year,month+1,0).getDate();
        for(let i=0;i<firstDay;i++) body.appendChild(document.createElement('div'));
        for(let d=1;d<=daysInMonth;d++) {
            const key=isoKey(year,month,d);
            const data=store.calendar[key]||{s:'-',a:''};
            const box=document.createElement('div'); box.className='day-box';
            if(new Date().toDateString()===new Date(year,month,d).toDateString()) box.classList.add('today');

            const reminderDot=data.reminder?`<div style="position:absolute;bottom:2px;right:3px;width:4px;height:4px;border-radius:50%;background:#8888ff;"></div>`:'';

            body.appendChild(box);
        }
        updateShiftSummary();
    }

        const getFullAssign=(short)=>{ if(!short) return ''; return short.replace(/Amb/g,'Ambulance').replace(/TL/g,'Team Leader'); };
        const getS=(date)=>{
            const key=isoKey(date.getFullYear(),date.getMonth(),date.getDate());
            const d=store.calendar[key]; if(!d||d.s==='-') return "OFF";
            return `${d.s}${d.a?' · '+getFullAssign(d.a):''}`;
        };

        document.getElementById('summary-tomorrow').innerText=getS(tom);

            const d=new Date(now); d.setDate(now.getDate()+i);
            const key=isoKey(d.getFullYear(),d.getMonth(),d.getDate());
            const entry=store.calendar[key];

            remDiv.style.display='block';

    // ── DRUG ──
    function searchDrugs() {
        const q=document.getElementById('drug-search').value.toLowerCase();
        const results=document.getElementById('drug-results'); results.innerHTML=''; if(!q) return;
        const matched=store.drugs.map((d,idx)=>({d,idx})).filter(({d})=>d.name.toLowerCase().includes(q));
        if(matched.length===0){ results.innerHTML='<div style="font-size:0.75rem;color:var(--text-muted);text-align:center;padding:16px;">Tiada ubat ditemui.</div>'; return; }

            const div=document.createElement('div'); div.className='drug-item';

    function openEditDrugSheet(idx) {

    function updateDrug(idx) {

    function deleteDrug(idx){if(confirm("Padam ubat ini?")){store.drugs.splice(idx,1);saveData();searchDrugs();}}

    // ── SHIFT PICKER ──
    function openShiftPicker(key) {
        const existing=store.calendar[key]||{};
        const parts=key.split('-');
        const dispDate=parts.length===3?`${parts[2]}/${parts[1]}/${parts[0]}`:key;
        document.getElementById('sheet-title').innerText=`Shift — ${dispDate}`;
        const currentRaw=existing.s&&existing.s!=='-'?existing.s:'';
        document.getElementById('sheet-content').innerHTML=`
            <label>Kod Shift</label>
            <input type="text" id="shift-input" placeholder="cth: N# atau M/E*"
                value="${currentRaw}"
                style="font-size:1.2rem;font-weight:700;text-align:center;letter-spacing:0.08em;"
                oninput="this.value=this.value.toUpperCase()"
                onkeydown="if(event.key==='Enter') applyTypedShift('${key}')">
            <div id="shift-parse-preview"></div>
            <button class="btn-primary" onclick="applyTypedShift('${key}')">SIMPAN SHIFT</button>
            <button class="btn-secondary" onclick="openReminderSheet('${key}')">🔔 REMINDER${existing.reminder?' · '+existing.reminder.substring(0,18)+(existing.reminder.length>18?'...':''):''}</button>
            ${existing.s&&existing.s!=='-'?`<button class="btn-danger" onclick="clearShift('${key}')">KOSONGKAN</button>`:''}
            ${existing.s==='RPL'?`<button class="btn-secondary" onclick="openRPLLinkSheet('${key}')" style="border-color:rgba(80,200,120,0.3);color:var(--primary);">🔗 PAUT REKOD RPL</button>`:''}
            ${existing.s==='PH'?`<button class="btn-secondary" onclick="openPHLinkSheet('${key}')" style="border-color:rgba(229,192,123,0.35);color:#e5c07b;">📅 PAUT CUTI UMUM</button>`:''}
        `;
        openSheet();
        setTimeout(()=>{
            const inp=document.getElementById('shift-input');
            if(inp){inp.focus();inp.select();inp.addEventListener('input',()=>livePreviewShift(inp.value));}
        },350);
    }

    function livePreviewShift(val) {
        const prev=document.getElementById('shift-parse-preview'); if(!prev) return;
        if(!val.trim()){prev.innerHTML='';return;}
        const parsed=parseShiftCell(val);
        if(parsed){ const assign=parsed.a?` <span style="color:var(--primary)">@ ${parsed.a}</span>`:''; prev.innerHTML=`<div class="preview-ok">→ Shift: <b style="color:var(--text)">${parsed.s}</b>${assign}</div>`; }
        else { prev.innerHTML=`<div class="preview-err">⚠️ Format tidak dikenali</div>`; }
    }

    function applyTypedShift(key) {
        const val=(document.getElementById('shift-input').value||'').trim(); if(!val) return;
        const parsed=parseShiftCell(val); if(!parsed){alert('Format shift tidak dikenali.');return;}
        const prevLinked=(store.calendar[key]&&store.calendar[key].rplLinked)||null;
        const prevPHLinked=(store.calendar[key]&&store.calendar[key].phLinked)||null;
        store.calendar[key]={s:parsed.s,a:parsed.a};
        if(parsed.s==='RPL'&&prevLinked) store.calendar[key].rplLinked=prevLinked;
        if(parsed.s==='PH'&&prevPHLinked) store.calendar[key].phLinked=prevPHLinked;
        saveData();generateCalendar();closeSheet();
        if(parsed.s==='RPL'&&!prevLinked&&store.rpl.records.length>0) setTimeout(()=>openRPLLinkSheet(key),350);
        if(parsed.s==='PH'&&!prevPHLinked) setTimeout(()=>openPHLinkSheet(key),350);
    }
    function clearShift(key){if(store.calendar[key]){delete store.calendar[key];saveData();generateCalendar();closeSheet();}}

    function openReminderSheet(key) {
        const parts=key.split('-'), dispDate=parts.length===3?`${parts[2]}/${parts[1]}/${parts[0]}`:key;
        const existing=store.calendar[key]||{};
        document.getElementById('sheet-title').innerText=`🔔 Reminder — ${dispDate}`;
        document.getElementById('sheet-content').innerHTML=`
            <label>Nota Reminder</label>
            <textarea id="reminder-input" style="height:110px;" placeholder="cth: AUDIT MSQH, Mesyuarat, Kursus BLS...">${existing.reminder||''}</textarea>
            <button class="btn-primary" onclick="saveReminder('${key}')">SIMPAN REMINDER</button>
            ${existing.reminder?`<button class="btn-danger" onclick="deleteReminder('${key}')">BUANG REMINDER</button>`:''}
        `;
        openSheet();
        setTimeout(()=>{const el=document.getElementById('reminder-input');if(el)el.focus();},350);
    }
    function saveReminder(key){const val=(document.getElementById('reminder-input').value||'').trim(); if(!store.calendar[key]) store.calendar[key]={s:'-',a:''}; store.calendar[key].reminder=val; saveData();generateCalendar();closeSheet();}
    function deleteReminder(key){if(store.calendar[key]){delete store.calendar[key].reminder;saveData();generateCalendar();closeSheet();}}

    function openRPLLinkSheet(key) {
        const parts=key.split('-'), dispDate=parts.length===3?`${parts[2]}/${parts[1]}/${parts[0]}`:key;
        document.getElementById('sheet-title').innerText=`RPL — ${dispDate}`;
        const linkedDates=Object.keys(store.calendar).filter(k=>store.calendar[k].s==='RPL'&&store.calendar[k].rplLinked&&k!==key).map(k=>store.calendar[k].rplLinked);
        const available=store.rpl.records.filter(r=>!linkedDates.includes(r.d1));
        let html='';
        if(available.length===0) html+=`<div style="font-size:0.75rem;color:var(--text-dim);padding:12px;text-align:center;border:1px solid var(--border);border-radius:var(--radius-xs);margin-bottom:12px;">Tiada rekod RPL. Tambah rekod RPL dahulu.</div>`;
        else {
            html+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">`;
            available.forEach(r=>{
                const isLinked=store.calendar[key]&&store.calendar[key].rplLinked===r.d1;
                const dispPH=toMY(r.d1), dispRepl=r.isPaid?'PAID':toMY(r.d2);
                html+=`<div onclick="linkRPL('${key}','${r.d1}')" style="background:${isLinked?'var(--primary-dim)':'var(--surface)'};border:1px solid ${isLinked?'var(--primary)':'var(--border)'};border-radius:var(--radius-sm);padding:12px;cursor:pointer;"><div style="font-weight:700;font-size:0.8rem;color:${isLinked?'var(--primary)':'var(--text)'};margin-bottom:3px;">${r.t}</div><div style="font-size:0.68rem;color:var(--text-dim);">PH: ${dispPH} → Ganti: ${dispRepl}</div>${isLinked?'<div style="font-size:0.62rem;color:var(--primary);margin-top:4px;">✓ Sedang dipaut</div>':''}</div>`;
            });
            html+=`</div>`;
        }
        if(store.calendar[key]&&store.calendar[key].rplLinked) html+=`<button class="btn-danger" onclick="unlinkRPL('${key}')">✕ Buang Pautan RPL</button>`;
        html+=`<button class="btn-secondary" onclick="openShiftPicker('${key}')">✏️ Tukar Shift Lain</button>`;
        document.getElementById('sheet-content').innerHTML=html; openSheet();
    }
    function linkRPL(calKey,rplD1){if(!store.calendar[calKey])store.calendar[calKey]={s:'RPL',a:''}; store.calendar[calKey].rplLinked=rplD1; const phParts=rplD1.split('-'); store.calendar[calKey].a=`PH:${phParts.length===3?phParts[2]+'/'+phParts[1]:rplD1}`; saveData();generateCalendar();closeSheet();}
    function unlinkRPL(calKey){if(store.calendar[calKey]){delete store.calendar[calKey].rplLinked;store.calendar[calKey].a='';} saveData();generateCalendar();closeSheet();}

    function openPHLinkSheet(key) {
        const parts=key.split('-'), dispDate=parts.length===3?`${parts[2]}/${parts[1]}/${parts[0]}`:key;
        document.getElementById('sheet-title').innerText=`📅 PH — ${dispDate}`;
        // PH entries from ph2026 that are NOT yet linked to another calendar date (except current key)
        const linkedPHDates=Object.keys(store.calendar)
            .filter(k=>store.calendar[k].s==='PH'&&store.calendar[k].phLinked&&k!==key)
            .map(k=>store.calendar[k].phLinked);
        const available=ph2026.filter(p=>!linkedPHDates.includes(p.d));
        let html='';
        if(available.length===0) {
            html+=`<div style="font-size:0.75rem;color:var(--text-dim);padding:12px;text-align:center;border:1px solid var(--border);border-radius:var(--radius-xs);margin-bottom:12px;">Tiada rekod PH tersedia.</div>`;
        } else {
            html+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">`;
            available.forEach(p=>{
                const isLinked=store.calendar[key]&&store.calendar[key].phLinked===p.d;
                const dispD=toMY(p.d);
                const paidBadge=p.paid?`<span style="font-size:0.58rem;background:rgba(243,156,18,0.18);color:#f39c12;padding:1px 6px;border-radius:20px;font-weight:700;margin-left:6px;">PAID</span>`:'';
                html+=`<div onclick="linkPH('${key}','${p.d}')" style="background:${isLinked?'rgba(229,192,123,0.1)':'var(--surface)'};border:1px solid ${isLinked?'#e5c07b':'var(--border)'};border-radius:var(--radius-sm);padding:12px;cursor:pointer;">
                    <div style="font-weight:700;font-size:0.8rem;color:${isLinked?'#e5c07b':'var(--text)'};margin-bottom:3px;">${p.n}${paidBadge}</div>
                    <div style="font-size:0.68rem;color:var(--text-dim);">📅 ${dispD}</div>
                    ${isLinked?'<div style="font-size:0.62rem;color:#e5c07b;margin-top:4px;">✓ Sedang dipaut</div>':''}
                </div>`;
            });
            html+=`</div>`;
        }
        if(store.calendar[key]&&store.calendar[key].phLinked) html+=`<button class="btn-danger" onclick="unlinkPH('${key}')">✕ Buang Pautan PH</button>`;
        html+=`<button class="btn-secondary" onclick="openShiftPicker('${key}')">✏️ Tukar Shift Lain</button>`;
        document.getElementById('sheet-content').innerHTML=html; openSheet();
    }
    function linkPH(calKey,phDate){
        if(!store.calendar[calKey]) store.calendar[calKey]={s:'PH',a:''};
        store.calendar[calKey].phLinked=phDate;
        // Show PH name short label on calendar
        const entry=ph2026.find(p=>p.d===phDate);
        if(entry){ const short=entry.n.replace('Hari ','').replace('Tahun ','').substring(0,10); store.calendar[calKey].a=short; }
        saveData();generateCalendar();closeSheet();
    }
    function unlinkPH(calKey){if(store.calendar[calKey]){delete store.calendar[calKey].phLinked;store.calendar[calKey].a='';} saveData();generateCalendar();closeSheet();}

    // ── RECORDS ──
    function openRecordSheet(type){document.getElementById('sheet-title').innerText=type;renderRecords(type);openSheet();}

    function checkPaidPH(){
        const sel=document.getElementById('in-ph-select'); if(!sel) return;
        const isPaid=sel.options[sel.selectedIndex].getAttribute('data-paid')==='true';
        document.getElementById('paid-alert').style.display=isPaid?'block':'none';
        document.getElementById('in-d2').style.display=isPaid?'none':'block';
        if(isPaid) document.getElementById('paid-alert').innerText="PH ini telah dibayar (Paid).";
    }

    function renderRecords(type){
        const content=document.getElementById('sheet-content'); let html='<div>';
        if(type==='AL'){
            store.al.taken.forEach((d,i)=>html+=`<div class="record-card"><div>Cuti: ${toMY(d)}</div><button class="btn-delete" onclick="store.al.taken.splice(${i},1);saveData();renderRecords('AL')">×</button></div>`);
            html+=`<label>Tarikh Cuti</label><input type="date" id="in-d" onclick="triggerDatePicker('in-d')">`;
        } else if(type==='RPL'){
            store.rpl.records.forEach((r,i)=>html+=`<div class="record-card"><div><b>${r.t}</b><br><small style="color:var(--text-dim)">${toMY(r.d1)} ➔ ${r.isPaid?'PAID':toMY(r.d2)}</small></div><button class="btn-delete" onclick="store.rpl.records.splice(${i},1);saveData();renderRecords('RPL')">×</button></div>`);
            const recordedDates=store.rpl.records.map(r=>r.d1);
            const avPH=ph2026.filter(p=>!recordedDates.includes(p.d));
            html+=`<div id="paid-alert" class="paid-alert"></div><label>Pilih PH</label><select id="in-ph-select" onchange="document.getElementById('in-d1').value=this.value;checkPaidPH();"><option value="">-- Pilih --</option>${avPH.map(p=>{const dp=p.d.split('-');return`<option value="${p.d}" data-paid="${p.paid}">(${dp[2]}/${dp[1]}) ${p.n}</option>`;}).join('')}</select><input type="date" id="in-d1" hidden><label id="label-rpl">Tarikh Ganti</label><input type="date" id="in-d2" onclick="triggerDatePicker('in-d2')">`;
        } else if(type==='CPD'){
            store.cpd.records.forEach((r,i)=>html+=`<div class="record-card"><div style="flex:1"><b>${r.t}</b><br><small style="color:var(--text-dim)">📅 ${toMY(r.d)} | 🕒 ${r.t1} - ${r.t2}</small></div><div style="font-weight:700;color:var(--success);margin-right:8px;">${r.p} Pts</div><div style="display:flex;flex-direction:column;gap:4px;"><button style="background:none;color:var(--primary);border:none;font-size:0.65rem;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;" onclick="editCPD(${i})">EDIT</button><button class="btn-delete" onclick="store.cpd.records.splice(${i},1);saveData();renderRecords('CPD')">×</button></div></div>`);
            html+=`<input type="hidden" id="cpd-edit-idx" value="-1"><label>Nama Kursus</label><input type="text" id="in-t"><label>Tarikh</label><input type="date" id="in-d" onclick="triggerDatePicker('in-d')"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div><label>Mula</label><input type="time" id="in-t1"></div><div><label>Tamat</label><input type="time" id="in-t2"></div></div><label>Mata</label><input type="number" id="in-p">`;
        }
        html+=`</div><button class="btn-primary" id="btn-save-rec" onclick="addRec('${type}')">SIMPAN</button>`;
        content.innerHTML=html;
    }

    function addRec(type){
        if(type==='AL'){const d=document.getElementById('in-d').value;if(d)store.al.taken.push(d);}
        else if(type==='RPL'){const sel=document.getElementById('in-ph-select'),d1=document.getElementById('in-d1').value,d2=document.getElementById('in-d2').value;if(sel&&d1){const t=sel.options[sel.selectedIndex].text,isPaid=sel.options[sel.selectedIndex].getAttribute('data-paid')==='true';if(t&&d1&&(isPaid||d2))store.rpl.records.push({t,d1,d2,isPaid});}}
        else if(type==='CPD'){
            const t=document.getElementById('in-t').value,d=document.getElementById('in-d').value,p=document.getElementById('in-p').value,t1=document.getElementById('in-t1').value,t2=document.getElementById('in-t2').value;
            const idx=parseInt(document.getElementById('cpd-edit-idx').value);
            if(t&&d&&p&&t1&&t2){
                if(idx>=0){ store.cpd.records[idx]={t,d,p,t1,t2}; }
                else { store.cpd.records.push({t,d,p,t1,t2}); }
            }
        }
        saveData();renderRecords(type);
    }

    function editCPD(i){
        const r=store.cpd.records[i];
        document.getElementById('cpd-edit-idx').value=i;
        document.getElementById('in-t').value=r.t;
        document.getElementById('in-d').value=r.d;
        document.getElementById('in-t1').value=r.t1;
        document.getElementById('in-t2').value=r.t2;
        document.getElementById('in-p').value=r.p;

        document.getElementById('in-t').focus();
        document.getElementById('in-t').scrollIntoView({behavior:'smooth',block:'center'});
    }

        });

    // ── STATS ──
    function renderStats(){
        document.getElementById('text-al').innerText=store.al.taken.length;
        document.getElementById('text-rpl').innerText=store.rpl.records.length;
        const pts=store.cpd.records.reduce((s,r)=>s+Number(r.p),0);
        document.getElementById('text-cpd').innerText=`${pts}/20`;
        document.getElementById('bar-cpd').style.width=Math.min((pts/20*100),100)+'%';
        const month=currentCalDate.getMonth(),year=currentCalDate.getFullYear();
        let n_count=0;
        Object.keys(store.calendar).forEach(key=>{
            const p=key.split('-');
            if(p.length===3&&parseInt(p[0])===year&&parseInt(p[1])-1===month&&store.calendar[key].s==='N') n_count++;
        });
        document.getElementById('text-night-count').innerText=n_count;
        renderTodos(); renderClaim();
    }

    // ── CLAIM ──
    function toggleClaim(){
        const body=document.getElementById('claim-body'), icon=document.getElementById('claim-toggle-icon'); if(!body)return;
        const isHidden=body.style.display==='none';
        body.style.display=isHidden?'block':'none';
        if(icon) icon.innerText=isHidden?'▲':'▼';
    }

    function renderClaim(){
        const year=currentCalDate.getFullYear(), month=currentCalDate.getMonth();
        const months=["Januari","Februari","Mac","April","Mei","Jun","Julai","Ogos","September","Oktober","November","Disember"];
        const label=document.getElementById('claim-month-label'), body=document.getElementById('claim-body'); if(!body)return;
        if(label) label.innerText=`${months[month]} ${year}`;
        const malam=[],locum=[],phBayar=[];
        Object.keys(store.calendar).forEach(key=>{
            const p=key.split('-'); if(p.length!==3)return;
            const y=parseInt(p[0]),m=parseInt(p[1])-1,d=parseInt(p[2]);
            if(y!==year||m!==month)return;
            const entry=store.calendar[key]; const s=entry.s||'';
            const dateStr=`${String(d).padStart(2,'0')}/${String(month+1).padStart(2,'0')}/${year}`;
            if(s==='N') malam.push({date:dateStr,shift:s});
            if(s==='M/E'||s==='M/N'||s==='E/N'){const assign=entry.a?` (${entry.a})`:''; locum.push({date:dateStr,shift:s+assign});}
            if(s==='PH'){const phEntry=ph2026.find(p=>p.d===key);if(phEntry&&phEntry.paid)phBayar.push({date:dateStr,name:phEntry.n});}
        });
        const sortFn=(a,b)=>a.date.localeCompare(b.date);
        malam.sort(sortFn);locum.sort(sortFn);phBayar.sort(sortFn);
        function buildRows(items,emptyMsg,fn){if(items.length===0)return`<div style="font-size:0.7rem;color:var(--text-muted);padding:4px 0;">${emptyMsg}</div>`;return items.map(fn).join('');}
        function row(l,r){return`<div class="claim-row"><span style="font-size:0.78rem;color:var(--text);font-weight:600;">${l}</span><span style="font-size:0.72rem;color:var(--primary);">${r}</span></div>`;}
        function block(icon,title,count,rows){return`<div style="margin-bottom:12px;"><div class="claim-cat-header"><span style="font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);">${icon} ${title}</span><span class="claim-badge">${count}</span></div>${rows}</div>`;}
        body.innerHTML=
            block('🌙','Shift Malam',malam.length,buildRows(malam,'Tiada shift malam bulan ini.',i=>row(i.date,i.shift)))+
            `<div class="claim-divider"></div>`+
            block('🔄','Locum / Double Shift',locum.length,buildRows(locum,'Tiada double shift bulan ini.',i=>row(i.date,i.shift)))+
            `<div class="claim-divider"></div>`+
            block('📅','PH Berbayar',phBayar.length,buildRows(phBayar,'Tiada PH berbayar bulan ini.',i=>row(i.date,i.name)));
    }

    // ── RSI ──
    function handleRSIClick(){
        document.getElementById('sheet-title').innerText="💉 Pre-Med RSI"; let html='';
        RSI_DATA.forEach(section=>{
            html+=`<div class="rsi-group-header">${section.group}</div>`;
            section.drugs.forEach(d=>{
                html+=`<div class="drug-item"><div style="flex:1;min-width:0;"><div class="drug-name">${d.name}</div><div class="drug-ampule">${d.ampule}</div><div class="drug-prep">${d.prep}</div></div></div>`;
            });
        });
        document.getElementById('sheet-content').innerHTML=html; openSheet();
    }

    // ── PDF ──
    function triggerPDFUpload(e){e.preventDefault();document.getElementById('pdf-upload').click();}
    function savePDF(e){
        const file=e.target.files[0]; if(file&&file.type==="application/pdf"){
            const reader=new FileReader(); reader.onload=function(ev){store.pdfData=ev.target.result;saveData();checkPDFStatus();alert("PDF berjaya dimuat naik!");};
            reader.readAsDataURL(file);
        } else alert("Sila pilih fail PDF sahaja.");
    }
    function openStoredPDF(){
        if(store.pdfData){
            const base64Parts=store.pdfData.split(','), contentType=base64Parts[0].split(':')[1].split(';')[0];
            const byteCharacters=atob(base64Parts[1]), byteArrays=[];
            for(let o=0;o<byteCharacters.length;o+=512){const slice=byteCharacters.slice(o,o+512);const bn=new Array(slice.length);for(let i=0;i<slice.length;i++)bn[i]=slice.charCodeAt(i);byteArrays.push(new Uint8Array(bn));}
            const blob=new Blob(byteArrays,{type:contentType}), blobUrl=URL.createObjectURL(blob);
            window.open(blobUrl,'_blank'); setTimeout(()=>URL.revokeObjectURL(blobUrl),100);
        }
    }
    function checkPDFStatus(){if(store.pdfData) document.getElementById('btn-pdf').style.display='inline-block';}

    // ── SHEET ──
    function openSheet(){document.getElementById('overlay').style.display='block'; setTimeout(()=>document.getElementById('sheet').classList.add('active'),10);}
    function closeSheet(){document.getElementById('sheet').classList.remove('active'); setTimeout(()=>document.getElementById('overlay').style.display='none',350);}
    function loadImg(e){const r=new FileReader();r.onload=()=>{document.getElementById('profile-pic').src=r.result;store.profilePic=r.result;saveData();};r.readAsDataURL(e.target.files[0]);}

    // ── BACKUP / RESTORE ──
    function backupData(){
        const blob=new Blob([JSON.stringify(store)],{type:"application/json"});
        const url=URL.createObjectURL(blob), a=document.createElement('a');
        a.href=url;a.download=`backup_roster_${new Date().toISOString().split('T')[0]}.json`;a.click();
        alert("Data berjaya dieksport!");
    }
    function restoreData(){document.getElementById('restore-upload').click();}
    function processRestore(e){
        const file=e.target.files[0]; if(!file)return;
        const reader=new FileReader();
        reader.onload=function(ev){
            try{
                const parsed=JSON.parse(ev.target.result);
                if(typeof parsed!=='object'||!parsed.calendar){alert("Fail tidak sah.");return;}
                if(!confirm("Data semasa akan digantikan. Teruskan?"))return;
                store=parsed; migrateCalendarKeys(); saveData(); generateCalendar(); renderStats(); loadNotes(); checkPDFStatus();
                alert("✅ Data berjaya dipulihkan!");
            }catch(err){alert("Ralat: Fail tidak dapat dibaca.");}
        };
        reader.readAsText(file); e.target.value='';
    }

    // ── IMPORT ──
    function openImportSheet(){
        document.getElementById('sheet-title').innerText="📋 Import Jadual Excel";
        document.getElementById('sheet-content').innerHTML=`
            <div style="font-size:0.72rem;color:var(--text-dim);margin-bottom:12px;line-height:1.7;background:var(--surface);padding:12px;border-radius:var(--radius-xs);border:1px solid var(--border);">
                <b style="color:var(--primary);display:block;margin-bottom:4px;">Cara import:</b>
                1. Buka Excel, select <b>baris DATE</b> dan <b>baris shift</b> anda (2 baris)<br>
                2. Copy (Ctrl+C) → Paste dalam kotak bawah<br><br>
                <b style="color:var(--text-dim)">Format:</b> <span style="font-family:'JetBrains Mono',monospace;color:var(--primary);">M* E(T) N# SD DO AL PH MC RPL (T)M/E#</span>
            </div>
            <label>Bulan & Tahun</label>
            <input type="month" id="import-month" style="margin-bottom:10px;">
            <label>Paste data dari Excel</label>
            <textarea id="import-paste" style="height:120px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;" placeholder="Paste di sini... (2 baris: DATE dan shift)"></textarea>
            <div id="import-preview" style="margin-top:8px;"></div>
            <button class="btn-secondary" onclick="previewImport()">🔍 PREVIEW</button>
            <button id="btn-confirm-import" class="btn-primary" onclick="confirmImport()" style="display:none;">✅ SIMPAN KE CALENDAR</button>`;
        const y=currentCalDate.getFullYear(),m=String(currentCalDate.getMonth()+1).padStart(2,'0');
        document.getElementById('import-month').value=`${y}-${m}`;
        openSheet();
    }

    function parseAssign(sym){if(!sym)return'';sym=sym.trim();if(sym==='*')return'TL';if(sym==='#')return'Amb';if(sym==='(T)')return'Triage';return sym;}
    function extractPrefix(cell){const m=cell.match(/^(\*|\(T\)|#)/);return m?m[1]:'';}
    function extractSuffix(cell){const m=cell.match(/(\*|\(T\)|#)$/);return m?m[1]:'';}
    function parseShiftCell(raw){
        if(!raw)return null;
        const cell=raw.trim().toUpperCase().replace(/\(t\)/gi,'(T)');
        const plain=['SD','DO','AL','PH','MC','RPL','TD','ST','WP','OFF','-'];
        if(plain.includes(cell.replace(/[^A-Z]/g,'')))return{s:cell.replace(/[^A-Z\/]/g,''),a:''};
        if(cell.includes('/')){
            const prefix=extractPrefix(cell), suffix=extractSuffix(cell);
            const core=cell.replace(/^(\*|\(T\)|#)/,'').replace(/(\*|\(T\)|#)$/,'');
            const parts=core.split('/');
            if(parts.length===2){const shift=`${parts[0]}/${parts[1]}`,a1=parseAssign(prefix),a2=parseAssign(suffix),assign=(a1&&a2)?`${a1} / ${a2}`:(a1||a2);return{s:shift,a:assign};}
        }
        const singleMatch=cell.match(/^(\*|\(T\)|#)?([MEN])(\*|\(T\)|#)?$/);
        if(singleMatch){const sym=singleMatch[1]||singleMatch[3]||'';return{s:singleMatch[2],a:parseAssign(sym)};}
        const shiftOnly=cell.replace(/[^A-Z\/]/g,'');
        if(shiftOnly)return{s:shiftOnly,a:''};
        return null;
    }

    let _importParsed=[];
    function previewImport(){
        const raw=document.getElementById('import-paste').value, monthVal=document.getElementById('import-month').value, preview=document.getElementById('import-preview');
        _importParsed=[];
        if(!monthVal){preview.innerHTML='<p style="color:var(--danger);font-size:0.75rem;">⚠️ Sila pilih bulan & tahun.</p>';return;}
        if(!raw.trim()){preview.innerHTML='<p style="color:var(--danger);font-size:0.75rem;">⚠️ Tiada data.</p>';return;}
        const[impYear,impMonth]=monthVal.split('-').map(Number);
        const rows=raw.trim().split('\n').map(r=>r.split('\t').map(c=>c.trim()));
        let dateRow=null,shiftRow=null;
        for(let i=0;i<rows.length;i++){const nc=rows[i].filter(c=>/^\d{1,2}(\(PH\))?$/.test(c.replace(/\s/g,''))).length;if(nc>=5){dateRow=rows[i];shiftRow=rows[i+1]||null;break;}}
        if(!dateRow||!shiftRow){preview.innerHTML='<p style="color:var(--danger);font-size:0.75rem;">⚠️ Format tidak dikenali. Copy 2 baris: DATE dan shift.</p>';return;}
        let html=`<div style="font-size:0.7rem;margin-top:6px;border:1px solid var(--border);border-radius:var(--radius-xs);overflow:hidden;"><div style="background:var(--surface);padding:6px 10px;font-size:0.6rem;color:var(--text-dim);font-weight:700;font-family:'JetBrains Mono',monospace;">PREVIEW</div>`;
        let count=0;
        for(let col=0;col<dateRow.length;col++){
            const dayRaw=dateRow[col].replace(/\(PH\)/i,'').trim(), day=parseInt(dayRaw); if(isNaN(day)||day<1||day>31)continue;
            const cellRaw=shiftRow[col]||''; if(!cellRaw)continue;
            const parsed=parseShiftCell(cellRaw); if(!parsed)continue;
            const key=`${impYear}-${String(impMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            _importParsed.push({key,...parsed});
            const assignLabel=parsed.a?`<span style="color:var(--primary)"> @ ${parsed.a}</span>`:'';
            html+=`<div style="display:flex;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--border);align-items:center;"><span style="color:var(--text-dim);min-width:36px;font-family:'JetBrains Mono',monospace;">${String(day).padStart(2,'0')}/${String(impMonth).padStart(2,'0')}</span><span style="font-weight:700;color:var(--text);">${parsed.s}${assignLabel}</span><span style="font-size:0.58rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">${cellRaw}</span></div>`;
            count++;
        }
        html+='</div>';
        if(count===0){preview.innerHTML='<p style="color:var(--danger);font-size:0.75rem;">⚠️ Tiada shift yang dapat dikenali.</p>';document.getElementById('btn-confirm-import').style.display='none';return;}
        html+=`<p style="font-size:0.7rem;color:var(--text-dim);margin-top:6px;">✅ ${count} hari berjaya diparse.</p>`;
        preview.innerHTML=html; document.getElementById('btn-confirm-import').style.display='block';
    }

    function confirmImport(){
        if(_importParsed.length===0)return;
        _importParsed.forEach(entry=>{store.calendar[entry.key]={s:entry.s,a:entry.a};});
        saveData();generateCalendar();closeSheet();_importParsed=[];
        alert("✅ Shift berjaya dimasukkan ke calendar!");
    }

    // ── MIGRATE ──
    function migrateDefaultDrugs(){
        const existingNames=store.drugs.map(d=>d.name.toLowerCase()); let added=0;
        DEFAULT_DRUGS.forEach(def=>{if(!existingNames.includes(def.name.toLowerCase())){store.drugs.push(def);added++;}});
        store.drugs=store.drugs.map(d=>({name:d.name,ampule:d.ampule||d.prep||'—',prep:d.prep||''}));
        if(added>0) localStorage.setItem('roster_ultimate_v3',JSON.stringify(store));
    }

    // ── THEME ──
    const THEMES = {
        dark: {
            bg:'#0a0a0a', surface:'#111', card:'#161616', cardRaised:'#1c1c1c',
            border:'#222', borderBright:'#2e2e2e',
            text:'#f0f0f0', textDim:'#777', textMuted:'#333',
            primary:'#50c878', primaryDim:'rgba(80,200,120,0.10)', primaryGlow:'rgba(80,200,120,0.30)',
            avatarBg:'50c878', avatarFg:'000',
            icon:'☀️', label:'CERAH'
        },
        light: {
            bg:'#f4f4f4', surface:'#ffffff', card:'#ffffff', cardRaised:'#f9f9f9',
            border:'#e0e0e0', borderBright:'#cccccc',
            text:'#111111', textDim:'#666666', textMuted:'#aaaaaa',
            primary:'#1a8f45', primaryDim:'rgba(26,143,69,0.10)', primaryGlow:'rgba(26,143,69,0.20)',
            avatarBg:'1a8f45', avatarFg:'fff',
            icon:'🌙', label:'GELAP'
        }
    };

    let currentTheme = 'dark';

    function applyTheme(name) {
        const t = THEMES[name]; if(!t) return;
        const r = document.documentElement;
        r.style.setProperty('--bg', t.bg);
        r.style.setProperty('--surface', t.surface);
        r.style.setProperty('--card', t.card);
        r.style.setProperty('--card-raised', t.cardRaised);
        r.style.setProperty('--border', t.border);
        r.style.setProperty('--border-bright', t.borderBright);
        r.style.setProperty('--text', t.text);
        r.style.setProperty('--text-dim', t.textDim);
        r.style.setProperty('--text-muted', t.textMuted);
        r.style.setProperty('--primary', t.primary);
        r.style.setProperty('--primary-dim', t.primaryDim);
        r.style.setProperty('--primary-glow', t.primaryGlow);
        // toggle button label
        const icon = document.getElementById('theme-toggle-icon');
        const label = document.getElementById('theme-toggle-label');
        if(icon) icon.innerText = t.icon;
        if(label) label.innerText = t.label;
        // avatar
        const pic = document.getElementById('profile-pic');
        if(pic && pic.src.includes('ui-avatars'))
            pic.src = `https://ui-avatars.com/api/?name=Ahmad+Zilalul&background=${t.avatarBg}&color=${t.avatarFg}&bold=true`;
        // ambient glow
        const glow = document.querySelector('.ambient-glow');
        if(glow) glow.style.background = `radial-gradient(circle,${t.primaryGlow} 0%,transparent 70%)`;
        currentTheme = name;
        localStorage.setItem('roster_theme', name);
    }

    function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    function loadTheme() { applyTheme(localStorage.getItem('roster_theme') === 'light' ? 'light' : 'dark'); }

    // ── INIT ──
    window.addEventListener('load',checkPDFStatus);
    migrateCalendarKeys();
    migrateDefaultDrugs();
    setInterval(updateTime,1000);
    updateTime();
    generateCalendar();
    renderStats();
    loadNotes();
    loadTheme();
</script>
